<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="ailinter shield icon">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D2A6E"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M100 15 C100 15 45 50 45 95 C45 140 20 155 20 168 C20 185 100 193 100 193 C100 193 180 185 180 168 C180 155 155 140 155 95 C155 50 100 15 100 15Z"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)"/>

  <!-- Shield body -->
  <path d="M100 28 L100 28 L55 58 L55 95 C55 135 35 148 35 160 C35 172 100 178 100 178 L100 178 C100 178 165 172 165 160 C165 148 145 135 145 95 L145 58 Z"
        fill="#1E293B" stroke="#3B82F6" stroke-width="2.5"/>

  <!-- Green band (Go Ahead) -->
  <rect x="55" y="60" width="90" height="28" fill="#22C55E" opacity="0.85" rx="2"/>

  <!-- Amber band (Proceed with Care) -->
  <rect x="55" y="90" width="90" height="28" fill="#F59E0B" opacity="0.85" rx="2"/>

  <!-- Red band (Stop & Refactor) -->
  <rect x="55" y="120" width="90" height="28" fill="#EF4444" opacity="0.85" rx="2"/>

  <!-- Radar sweep arc -->
  <path d="M65 118 Q100 70 135 118" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.9"
        stroke-dasharray="120 20 40 20" stroke-linecap="round"/>

  <!-- Radar pulse rings -->
  <ellipse cx="100" cy="115" rx="35" ry="12" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <ellipse cx="100" cy="115" rx="50" ry="18" fill="none" stroke="#3B82F6" stroke-width="0.7" opacity="0.15"/>

  <!-- AI circuit node (center) -->
  <circle cx="100" cy="105" r="8" fill="url(#blueGlow)"/>
  <circle cx="100" cy="105" r="5" fill="#1E293B"/>
  <circle cx="100" cy="105" r="3" fill="#60A5FA"/>

  <!-- Circuit traces -->
  <line x1="100" y1="97" x2="100" y2="88" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="88" r="2" fill="#3B82F6" opacity="0.6"/>
  <line x1="108" y1="105" x2="117" y2="105" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="117" cy="105" r="2" fill="#3B82F6" opacity="0.6"/>
  <line x1="92" y1="105" x2="83" y2="105" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="83" cy="105" r="2" fill="#3B82F6" opacity="0.6"/>

  <!-- Top notch -->
  <path d="M92 28 L100 18 L108 28" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
